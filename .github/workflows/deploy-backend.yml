name: Deploy Backend → AWS EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: hdb-match-backend
  EC2_INSTANCE_ID: i-0445fc9bb19097618

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          LLM_PROVIDER: test
          HOMEOS_AGENT_MODE: mock
        run: pytest tests/ -q --tb=short --ignore=tests/test_fetch_live.py --ignore=tests/test_db_session.py --ignore=tests/test_migrations_sql.py

  build-and-deploy:
    name: Build → ECR → EC2
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: backend
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $EC2_INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 274946909740.dkr.ecr.us-west-2.amazonaws.com","docker pull 274946909740.dkr.ecr.us-west-2.amazonaws.com/hdb-match-backend:latest","docker stop hdb-backend || true","docker rm hdb-backend || true","docker run -d --name hdb-backend --network hdb-net --restart always -p 8000:8000 -e AWS_REGION=us-west-2 -e AWS_S3_BUCKET=hdb-match-data -e AWS_BEDROCK_AGENT_ID=RX4UR3WWJH -e AWS_BEDROCK_AGENT_ALIAS_ID=TSTALIASID -e AI_GATEWAY_API_KEY=${{ secrets.AI_GATEWAY_API_KEY }} -e LLM_MODEL=google/gemini-2.0-flash -e LLM_PROVIDER=vercel -e ONEMAP_TOKEN=${{ secrets.ONEMAP_TOKEN }} -e DATAGOV_API_KEY=${{ secrets.DATAGOV_API_KEY }} -e LTA_DATAMALL_API_KEY=${{ secrets.LTA_DATAMALL_API_KEY }} -e DATABASE_URL=postgresql://hdbmatch:hdbmatch@hdb-postgres:5432/hdbmatch 274946909740.dkr.ecr.us-west-2.amazonaws.com/hdb-match-backend:latest"]}' \
            --region $AWS_REGION \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $EC2_INSTANCE_ID \
              --query 'StatusDetails' --output text 2>/dev/null || echo "Pending")
            echo "[$i/24] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $EC2_INSTANCE_ID \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done

      - name: Health check
        run: |
          echo "Waiting 15s for container to start..."
          sleep 15
          curl -f --retry 5 --retry-delay 5 http://54.203.13.36:8000/health
