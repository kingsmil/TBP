name: Deploy Frontend → EC2 (nginx)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  S3_BUCKET: hdb-match-data
  S3_PREFIX: frontend-dist
  EC2_INSTANCE_ID: i-0445fc9bb19097618

jobs:
  deploy:
    name: Build → S3 → EC2 nginx
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run --reporter=verbose 2>&1 || true

      - name: Build for production
        working-directory: frontend
        env:
          VITE_API_BASE: http://44.230.151.142:8000
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload dist to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/$S3_PREFIX/ \
            --delete \
            --region $AWS_REGION

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $EC2_INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "mkdir -p /usr/share/nginx/html/assets",
              "aws s3 sync s3://hdb-match-data/frontend-dist/assets/ /usr/share/nginx/html/assets/ --delete --region us-west-2",
              "test -n \"$(find /usr/share/nginx/html/assets -maxdepth 1 -type f -name '\''*.js'\'' -print -quit)\"",
              "test -n \"$(find /usr/share/nginx/html/assets -maxdepth 1 -type f -name '\''*.css'\'' -print -quit)\"",
              "aws s3 cp s3://hdb-match-data/frontend-dist/index.html /usr/share/nginx/html/index.html.next --region us-west-2",
              "test -s /usr/share/nginx/html/index.html.next",
              "mv /usr/share/nginx/html/index.html.next /usr/share/nginx/html/index.html",
              "nginx -t && systemctl reload nginx",
              "echo DEPLOY_DONE"
            ]}' \
            --region $AWS_REGION \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $EC2_INSTANCE_ID \
              --query 'StatusDetails' --output text 2>/dev/null || echo "Pending")
            echo "[$i/18] $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Frontend deployed!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $EC2_INSTANCE_ID \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done

      - name: Health check
        run: |
          sleep 5
          curl -fsS --retry 5 --retry-delay 3 http://44.230.151.142/ -o /tmp/index.html
          JS_PATH=$(grep -oE 'src="[^"]+\.js"' /tmp/index.html | head -1 | cut -d'"' -f2)
          CSS_PATH=$(grep -oE 'href="[^"]+\.css"' /tmp/index.html | head -1 | cut -d'"' -f2)
          test -n "$JS_PATH"
          test -n "$CSS_PATH"
          curl -fsS --retry 5 --retry-delay 3 "http://44.230.151.142$JS_PATH" -o /dev/null
          curl -fsS --retry 5 --retry-delay 3 "http://44.230.151.142$CSS_PATH" -o /dev/null
          echo "Frontend live at http://44.230.151.142"
