name: Deploy Backend → AWS EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: hdb-match-backend
  EC2_INSTANCE_ID: i-0445fc9bb19097618

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          LLM_PROVIDER: test
          HOMEOS_AGENT_MODE: mock
          AUTH_REQUIRED: "false"
        run: pytest tests/ -q --tb=short --ignore=tests/test_fetch_live.py --ignore=tests/test_db_session.py --ignore=tests/test_migrations_sql.py

  build-and-deploy:
    name: Build → ECR → EC2
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: backend
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $EC2_INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["set -eu; IMAGE=274946909740.dkr.ecr.us-west-2.amazonaws.com/hdb-match-backend:${{ github.sha }}; aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 274946909740.dkr.ecr.us-west-2.amazonaws.com; docker pull $IMAGE; PORT_CONTAINERS=$(docker ps -q --filter publish=8000); if [ -n \"$PORT_CONTAINERS\" ]; then docker rm -f $PORT_CONTAINERS; fi; docker rm -f hdb-backend 2>/dev/null || true; docker run -d --name hdb-backend --network hdb-net --restart always -p 8000:8000 -e AWS_REGION=us-west-2 -e AWS_S3_BUCKET=hdb-match-data -e AWS_BEDROCK_AGENT_ID=RX4UR3WWJH -e AWS_BEDROCK_AGENT_ALIAS_ID=TSTALIASID -e AI_GATEWAY_API_KEY=${{ secrets.AI_GATEWAY_API_KEY }} -e LLM_MODEL=openai/gpt-5.4-nano -e LLM_PROVIDER=vercel -e ONEMAP_TOKEN=${{ secrets.ONEMAP_TOKEN }} -e DATAGOV_API_KEY=${{ secrets.DATAGOV_API_KEY }} -e LTA_DATAMALL_API_KEY=${{ secrets.LTA_DATAMALL_API_KEY }} -e EXA_API_KEY=${{ secrets.EXA_API_KEY }} -e DATABASE_URL=postgresql://hdbmatch:hdbmatch@hdb-postgres:5432/hdbmatch -e AUTH_REQUIRED=true -e JWT_SECRET=${{ secrets.JWT_SECRET }} -e STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} -e STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }} -e STRIPE_PRICE_ID=${{ secrets.STRIPE_PRICE_ID }} -e FRONTEND_URL=http://54.203.13.36 $IMAGE; sleep 5; docker exec hdb-backend grep -q get_news /app/app/api/main.py; docker exec hdb-backend python -m app.db.migrate; docker exec hdb-postgres psql -U hdbmatch -d hdbmatch -c \"REFRESH MATERIALIZED VIEW mv_block_monthly_stats; REFRESH MATERIALIZED VIEW mv_estate_monthly_stats;\""]}' \
            --region $AWS_REGION \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          DEPLOYED=false
          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $EC2_INSTANCE_ID \
              --query 'StatusDetails' --output text 2>/dev/null || echo "Pending")
            echo "[$i/24] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded!"
              DEPLOYED=true
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $EC2_INSTANCE_ID \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done
          if [ "$DEPLOYED" != "true" ]; then
            echo "Deployment did not complete before the timeout."
            exit 1
          fi

      - name: Health check
        run: |
          echo "Waiting 15s for container to start..."
          sleep 15
          curl -f --retry 5 --retry-delay 5 http://54.203.13.36:8000/health
          curl -fsS http://54.203.13.36:8000/openapi.json | grep -q '"/news"'

  sync-listings:
    name: Sync HDB active listings
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run listing sync via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $EC2_INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["docker exec hdb-backend python -m app.data.hdb_listings --delay 0.15"]}' \
            --region $AWS_REGION \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $EC2_INSTANCE_ID \
              --query 'StatusDetails' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Listings sync complete!"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $EC2_INSTANCE_ID \
                --query 'StandardOutputContent' --output text
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $EC2_INSTANCE_ID \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done

      - name: Verify listing count
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $EC2_INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["docker exec hdb-postgres psql -U hdbmatch -d hdbmatch -c \"SELECT COUNT(*) AS active_listings, MAX(created_at) AS last_synced FROM hdb_active_listings;\""]}' \
            --region $AWS_REGION \
            --query 'Command.CommandId' \
            --output text)
          sleep 8
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $EC2_INSTANCE_ID \
            --query 'StandardOutputContent' --output text
